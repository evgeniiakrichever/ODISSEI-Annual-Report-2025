name: Generate PDF

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'

permissions:
  contents: write

jobs:
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate PDF
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const path = require('path');
          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 794, height: 1123 });
            await page.goto('file://' + path.resolve('index.html'), {
              waitUntil: 'networkidle0',
              timeout: 60000
            });
            await page.evaluate(() => {
              const s = document.createElement('style');
              s.textContent = \`
                * { transition: none !important; animation: none !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                .nav, .scroll-hint, .nav-pdf-btn { display: none !important; }
                body { padding-top: 0 !important; }
                .reveal, [class*='reveal'] { opacity: 1 !important; transform: none !important; }
                .hero { height: 1123px !important; min-height: 0 !important; page-break-after: always; }
                .numbers-band { page-break-inside: avoid; }
                .s { page-break-inside: avoid; }
                .inter { page-break-inside: avoid; }
                .budget-panel { page-break-inside: avoid; }
                .ws-grid { page-break-inside: avoid; }
              \`;
              document.head.appendChild(s);
              document.querySelectorAll('*').forEach(el => {
                if (window.getComputedStyle(el).opacity === '0') el.style.opacity = '1';
                el.style.transform = 'none';
              });
              document.querySelectorAll('[data-count]').forEach(el => {
                const target = el.getAttribute('data-count');
                const suffix = el.getAttribute('data-suffix') || '';
                el.textContent = Number(target).toLocaleString() + suffix;
              });
              document.querySelectorAll('.bp-fill').forEach(el => {
                const pct = el.getAttribute('data-pct');
                if (pct) el.style.width = pct + '%';
              });
            });
            await new Promise(r => setTimeout(r, 3000));
            await page.pdf({
              path: 'ODISSEI-Annual-Report-2025.pdf',
              format: 'A4',
              printBackground: true,
              margin: { top: 0, bottom: 0, left: 0, right: 0 }
            });
            await browser.close();
            console.log('PDF generated');
          })();
          "

      - name: Commit PDF back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ODISSEI-Annual-Report-2025.pdf
          git diff --staged --quiet || git commit -m "Auto-generate PDF [skip ci]"
          git push
